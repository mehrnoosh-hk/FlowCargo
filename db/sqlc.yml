version: "2"
sql:
  - engine: "postgresql"
    schema: "../migrations"
    queries: "./queries"
    gen:
      go:
        package: "db"
        out: "./sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - column: "*.created_at"
            go_type:
              import: "time"
              type: "Time"
          - column: "*.updated_at"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamp"
            go_type:
              import: "time"
              type: "Time"
