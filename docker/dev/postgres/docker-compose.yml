services:
  postgres:
    image: postgres:15.4
    container_name: flowcargo-postgres
    environment:
      POSTGRES_DB: flowcargo_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
